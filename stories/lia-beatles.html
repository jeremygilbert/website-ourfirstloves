var audio = document.getElementById('StoryAudio');
var img = document.getElementById('SlideshowImg');
var fill = document.getElementById('ProgressFill');
var timeDisp = document.getElementById('TimeDisplay');
var playBtn = document.getElementById('PlayBtn');
var playing = false;
var raf = null;

// Preload first image
if (slides.length > 0) {
  img.src = '../soundslides/lia/' + slides[0].img;
}

function getSlideIndex(t) {
  var idx = 0;
  for (var i = 0; i < slides.length; i++) {
    if (slides[i].time <= t) idx = i; else break;
  }
  return idx;
}

function fmt(s) {
  var m = Math.floor(s/60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function update() {
  if (!playing) return;
  var t = audio.currentTime;
  var dur = audio.duration || 1;
  var idx = getSlideIndex(t);
  var newSrc = '../soundslides/lia/' + slides[idx].img;
  if (img.src.indexOf(slides[idx].img) < 0) img.src = newSrc;
  fill.style.width = (t / dur * 100) + '%';
  timeDisp.textContent = fmt(t) + ' / ' + fmt(dur);
  raf = requestAnimationFrame(update);
}

function togglePlay() {
  if (playing) {
    audio.pause();
    playing = false;
    playBtn.textContent = '\u25b6 Play';
    cancelAnimationFrame(raf);
  } else {
    audio.play();
    playing = true;
    playBtn.textContent = '\u23f8 Pause';
    raf = requestAnimationFrame(update);
  }
}

function seekTo(e) {
  var bar = document.getElementById('ProgressBar');
  var rect = bar.getBoundingClientRect();
  var ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * (audio.duration || 0);
  if (!playing) {
    var t = audio.currentTime;
    var idx = getSlideIndex(t);
    img.src = '../soundslides/lia/' + slides[idx].img;
    fill.style.width = (ratio * 100) + '%';
  }
}

audio.addEventListener('ended', function() {
  playing = false;
  playBtn.textContent = '\u25b6 Play';
  cancelAnimationFrame(raf);
  fill.style.width = '100%';
});
