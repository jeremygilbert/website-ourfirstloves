<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="../style.css" />
<link rel="icon" href="../favicon.ico" type="image/x-icon" />
<style>
#SlideshowContainer {
  width: 570px;
  background: #000;
  position: relative;
  margin: 16px 0;
}
#SlideshowImg {
  width: 570px;
  height: 376px;
  object-fit: contain;
  background: #000;
  display: block;
}
#SlideshowControls {
  background: #111;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#SlideshowControls button {
  background: #333;
  color: #fff;
  border: none;
  padding: 4px 12px;
  cursor: pointer;
  font-size: 13px;
  border-radius: 2px;
}
#SlideshowControls button:hover { background: #555; }
#ProgressBar {
  flex: 1;
  height: 6px;
  background: #444;
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
}
#ProgressFill {
  height: 100%;
  background: #c00;
  width: 0%;
  transition: width 0.1s;
}
#TimeDisplay { color: #aaa; font-size: 11px; min-width: 60px; text-align: right; }
</style>
</head>
<body>

<div id="Wrapper">

  <div id="MenuColumn">
    <div id="Logo"><a href="../index.html"><img src="../images/logo.png" alt="Our First Loves" /></a></div>
<div id="TopNav">
      <a href="../best-loves.html" class="MenuLink">BEST LOVES</a>
      <a href="../archive.html"    class="MenuLink">ARCHIVE</a>
      <a href="../about.html"      class="MenuLink">ABOUT US</a>
    </div>
</div>

  <div id="ContentColumn">
    <div id="HeadlineContainer">
      <h1><span class="pagetitle">tommy's first love</span></h1>
      <h3>Tommy Giglio, 22 / childhood at first love.</h3>
    </div>

    <div id="SlideshowContainer">
      <img id="SlideshowImg" src="../soundslides/tommy/placeholder.jpg" alt="" />
      <div id="SlideshowControls">
        <button id="PlayBtn" onclick="togglePlay()">&#9654; Play</button>
        <div id="ProgressBar" onclick="seekTo(event)"><div id="ProgressFill"></div></div>
        <span id="TimeDisplay">0:00</span>
      </div>
    </div>

    <audio id="StoryAudio" src="../soundslides/tommy/audio.mp3" preload="auto"></audio>

    <div id="TranscriptHeader">
      <p><em>"It started the day my brother was born."</em></p>
    </div>

  </div>

  <div id="Sidebar">
    <div id="StoryInfo">
      <img src="../images/uploads/2009/03/tommy-pola-150x150.jpg" alt="" style="width:150px; height:150px; object-fit:cover;" />
    </div>
    <div id="AboutNav">
      <a href="../about.html"           class="MenuLink">ABOUT US</a>

    </div>
  </div>

</div>

<div class="footer-wrap">

    <ul>
      <li class="FirstFooterLink"><a href="../index.html">Home</a></li>

      <li><a href="../about.html">About Us</a></li>

</div>

<script>
var slides = [{"time": 0.0, "img": "myfirstlove.jpg"}, {"time": 5.296, "img": "98_ismybrother.jpg"}, {"time": 10.516, "img": "family.jpg"}, {"time": 18.004, "img": "335584791_l.jpg"}, {"time": 24.185, "img": "t_and_j.jpg"}, {"time": 30.712, "img": "school_again.jpg"}, {"time": 36.415, "img": "off_to_school.jpg"}, {"time": 47.725, "img": "tommy_and_jason.jpg"}, {"time": 60.23, "img": "img_5941.jpg"}, {"time": 66.882, "img": "n111018003_2_8871.jpg"}, {"time": 73.176, "img": "tom_and_jay.jpg"}, {"time": 80.904, "img": "camera_back_up_126.jpg"}, {"time": 87.431, "img": "_h9x3861.jpg"}, {"time": 91.247, "img": "golf.jpg"}, {"time": 102.348, "img": "camera_back_up_128.jpg"}, {"time": 110.344, "img": "bytommygiglio.jpg"}];
var audio = document.getElementById('StoryAudio');
var img = document.getElementById('SlideshowImg');
var fill = document.getElementById('ProgressFill');
var timeDisp = document.getElementById('TimeDisplay');
var playBtn = document.getElementById('PlayBtn');
var playing = false;
var raf = null;

// Preload first image
if (slides.length > 0) {
  img.src = '../soundslides/tommy/' + slides[0].img;
}

function getSlideIndex(t) {
  var idx = 0;
  for (var i = 0; i < slides.length; i++) {
    if (slides[i].time <= t) idx = i; else break;
  }
  return idx;
}

function fmt(s) {
  var m = Math.floor(s/60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function update() {
  if (!playing) return;
  var t = audio.currentTime;
  var dur = audio.duration || 1;
  var idx = getSlideIndex(t);
  var newSrc = '../soundslides/tommy/' + slides[idx].img;
  if (img.src.indexOf(slides[idx].img) < 0) img.src = newSrc;
  fill.style.width = (t / dur * 100) + '%';
  timeDisp.textContent = fmt(t) + ' / ' + fmt(dur);
  raf = requestAnimationFrame(update);
}

function togglePlay() {
  if (playing) {
    audio.pause();
    playing = false;
    playBtn.textContent = '\u25b6 Play';
    cancelAnimationFrame(raf);
  } else {
    audio.play();
    playing = true;
    playBtn.textContent = '\u23f8 Pause';
    raf = requestAnimationFrame(update);
  }
}

function seekTo(e) {
  var bar = document.getElementById('ProgressBar');
  var rect = bar.getBoundingClientRect();
  var ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * (audio.duration || 0);
  if (!playing) {
    var t = audio.currentTime;
    var idx = getSlideIndex(t);
    img.src = '../soundslides/tommy/' + slides[idx].img;
    fill.style.width = (ratio * 100) + '%';
  }
}

audio.addEventListener('ended', function() {
  playing = false;
  playBtn.textContent = '\u25b6 Play';
  cancelAnimationFrame(raf);
  fill.style.width = '100%';
});
</script>

</body>
</html>
