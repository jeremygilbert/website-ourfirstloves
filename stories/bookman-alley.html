<!DOCTYPE html>

<head>

<style>

  width: 570px;

  width: 0%;
  transition: width 0.1s;
}

</head>
<body>

<div id="Wrapper">

  <div id="MenuColumn">

<script>
var slides = [{"time": 0.0, "img": "img_1637.jpg"}, {"time": 2.848, "img": "roger_title.jpg"}, {"time": 4.416, "img": "img_1591.jpg"}, {"time": 8.544, "img": "img_1592.jpg"}, {"time": 11.392, "img": "img_1593.jpg"}, {"time": 14.24, "img": "img_1596.jpg"}, {"time": 17.12, "img": "img_1594.jpg"}, {"time": 19.968, "img": "img_1595.jpg"}, {"time": 22.816, "img": "img_1597.jpg"}, {"time": 30.144, "img": "img_1598.jpg"}, {"time": 35.424, "img": "img_1600.jpg"}, {"time": 39.936, "img": "img_1603.jpg"}, {"time": 44.768, "img": "img_1604.jpg"}, {"time": 50.208, "img": "img_1605.jpg"}, {"time": 56.16, "img": "img_1607.jpg"}, {"time": 59.936, "img": "img_1609.jpg"}, {"time": 65.408, "img": "img_1614.jpg"}, {"time": 70.912, "img": "img_1616.jpg"}, {"time": 76.16, "img": "img_1615.jpg"}, {"time": 82.24, "img": "img_1619.jpg"}, {"time": 86.88, "img": "img_1624.jpg"}, {"time": 91.648, "img": "img_1625.jpg"}, {"time": 96.16, "img": "img_1626.jpg"}, {"time": 100.48, "img": "img_1632.jpg"}, {"time": 104.864, "img": "img_1635.jpg"}, {"time": 109.12, "img": "img_1638.jpg"}, {"time": 113.248, "img": "img_1639.jpg"}];
var audio = document.getElementById('StoryAudio');
var img = document.getElementById('SlideshowImg');
var fill = document.getElementById('ProgressFill');
var timeDisp = document.getElementById('TimeDisplay');
var playBtn = document.getElementById('PlayBtn');
var playing = false;
var raf = null;

// Preload first image
if (slides.length > 0) {
  img.src = '../soundslides/bookman/' + slides[0].img;
}

function getSlideIndex(t) {
  var idx = 0;
  for (var i = 0; i < slides.length; i++) {
    if (slides[i].time <= t) idx = i; else break;
  }
  return idx;
}

function fmt(s) {
  var m = Math.floor(s/60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function update() {
  if (!playing) return;
  var t = audio.currentTime;
  var dur = audio.duration || 1;
  var idx = getSlideIndex(t);
  var newSrc = '../soundslides/bookman/' + slides[idx].img;
  if (img.src.indexOf(slides[idx].img) < 0) img.src = newSrc;
  fill.style.width = (t / dur * 100) + '%';
  timeDisp.textContent = fmt(t) + ' / ' + fmt(dur);
  raf = requestAnimationFrame(update);
}

function togglePlay() {
  if (playing) {
    audio.pause();
    playing = false;
    playBtn.textContent = '\u25b6 Play';
    cancelAnimationFrame(raf);
  } else {
    audio.play();
    playing = true;
    playBtn.textContent = '\u23f8 Pause';
    raf = requestAnimationFrame(update);
  }
}

function seekTo(e) {
  var bar = document.getElementById('ProgressBar');
  var rect = bar.getBoundingClientRect();
  var ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * (audio.duration || 0);
  if (!playing) {
    var t = audio.currentTime;
    var idx = getSlideIndex(t);
    img.src = '../soundslides/bookman/' + slides[idx].img;
    fill.style.width = (ratio * 100) + '%';
  }
}

audio.addEventListener('ended', function() {
  playing = false;
  playBtn.textContent = '\u25b6 Play';
  cancelAnimationFrame(raf);
  fill.style.width = '100%';
});
</script>

</body>
</html>
